name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spares
          POSTGRES_PASSWORD: spares
          POSTGRES_DB: spares
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spares -d spares"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://spares:spares@127.0.0.1:5432/spares
      ADMIN_SEED_EMAIL: admin@example.com
      ADMIN_SEED_PASSWORD: cms-ci-password
      APP_SESSION_SECRET: cms-ci-session-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bunx playwright install --with-deps chromium
      - run: bun run test
      - run: bun run build
